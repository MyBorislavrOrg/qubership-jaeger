---
name: REUSABLE_TEST
on:
  workflow_call:
    inputs:
      continue-on-error:
        type: boolean
        required: false
        default: true
        description: "Continue on error or not"
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Failed step
        continue-on-error: ${{ inputs.continue-on-error }}
        run: |
          echo "This step always fail"
          exit 1
      - name: Just a Step
        run: |
          echo "Just a Step"
          exit 0
  test2:
    runs-on: ubuntu-latest
    continue-on-error: ${{ inputs.continue-on-error }}
    steps:
      - name: Checkout repository (source target)
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: "Trivy scan"
        id: trivy-source
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 #v0.34.1
        with:
          scan-type: "fs"
          output: trivy.sarif
          format: "sarif"
          limit-severities-for-sarif: true
          version: 'v0.65.0'
      - name: Just a Step
        run: |
          echo "Just a Step"
          exit 0
