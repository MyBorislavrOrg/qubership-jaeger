name: Security Scan Docker Packages
run-name: >
  Security Scan #${{ github.run_number }} for ${{ inputs.image != '' && inputs.image != null && inputs.image || 'all repository docker images' }}
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target type for the scan (docker, etc.)"
        required: false
        type: choice
        options:
          - docker
          - source
      image:
        description: "Docker image (for docker). By default ghcr.io/<owner>/<repo>:latest"
        required: false
        default: ""
        type: string
      tag:
        description: "Tag of the image to scan. By default 'latest'"
        required: false
        default: "latest"
        type: string
      only-high-critical:
        description: "Scope only HIGH + CRITICAL"
        required: false
        default: true
        type: boolean
      trivy-scan:
        description: "Trivy scan"
        required: false
        default: true
        type: boolean
      trivy-version:
        description: "Trivy version"
        required: false
        default: latest
        type: string
      grype-scan:
        description: "Grype scan"
        required: false
        default: true
        type: boolean
      grype-version:
        description: "Grype version"
        required: false
        default: latest
        type: string
      continue-on-error:
        description: "Continue on error"
        required: false
        default: true
        type: boolean
      only-fixed:
        description: "Ignore unfixed vulnerabilities"
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "0 3 * * 0" # every Sunday at 03:00 UTC
permissions:
  contents: read
  security-events: write
  packages: read
jobs:
  debug-packages:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    outputs:
      packages: ${{ steps.ghcr.outputs.packages }}
      has-packages: ${{ steps.ghcr.outputs.has-packages }}
    steps:
      - name: List GHCR packages for this repo
        id: ghcr
        uses: Netcracker/qubership-workflow-hub/actions/ghcr-discover-repo-packages@6b356d28e46b2d4683cccb1d91f92643d7f0c513 #v2.0.11
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Print packages
        run: echo '${{ steps.ghcr.outputs.packages }}' | jq '.'

      - name: Continue only if repo has GHCR packages
        if: ${{ steps.ghcr.outputs.has-packages == 'true' }}
        run: echo "Packages found!"

      - name: No packages found, fail the job
        if: ${{ steps.ghcr.outputs.has-packages != 'true' }}
        run: |
          echo "No packages found in GHCR for this repository."
          exit 1

  security-scan-matrix:
    needs: debug-packages
    if: ${{ inputs.image == '' || inputs.image == null }}
    strategy:
      matrix:
        package: ${{ fromJson(needs.debug-packages.outputs.packages) }}

    name: "Run Security Scan (matrix)"
    uses: MyBorislavrOrg/qubership-jaeger/.github/workflows/re-security-scan.yml@main
    with:
      target: ${{ inputs.target || 'docker' }}
      image: ${{ format('{0}:{1}', matrix.package.path, inputs.tag || 'latest') }}
      only-high-critical: ${{ inputs.only-high-critical || github.event_name == 'schedule' }}
      trivy-scan: ${{ inputs.trivy-scan || github.event_name == 'schedule' }}
      trivy-version: ${{ inputs.trivy-version || 'latest' }}
      grype-scan: ${{ inputs.grype-scan || github.event_name == 'schedule' }}
      grype-version: ${{ inputs.grype-version || 'latest' }}
      only-fixed: ${{ inputs.only-fixed || github.event_name == 'schedule' }}
      continue-on-error: ${{ inputs.continue-on-error || github.event_name == 'schedule' }}

  security-scan-single:
    needs: debug-packages
    if: ${{ inputs.image != '' && inputs.image != null }}
    name: "Run Security Scan (single image)"
    uses: MyBorislavrOrg/qubership-jaeger/.github/workflows/re-security-scan.yml@main
    with:
      target: ${{ inputs.target || 'docker' }}
      image: ${{ inputs.image }}
      only-high-critical: ${{ inputs.only-high-critical }}
      trivy-scan: ${{ inputs.trivy-scan }}
      trivy-version: ${{ inputs.trivy-version || 'latest' }}
      grype-scan: ${{ inputs.grype-scan }}
      grype-version: ${{ inputs.grype-version || 'latest' }}
      only-fixed: ${{ inputs.only-fixed }}
      continue-on-error: ${{ inputs.continue-on-error }}
